<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Weiterleitung zu NebulaHub</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: white;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: #16213e;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #e94560;
            margin: 10px 0;
        }
        a {
            color: #e94560;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>🌌 Weiterleitung zu NebulaHub</h2>
        <div class="countdown" id="countdown">3</div>
        <p>Sie werden in <span id="seconds">3</span> Sekunden weitergeleitet...</p>
        <p>Falls die Weiterleitung nicht funktioniert, <a href="https://raw.githubusercontent.com/lzhenweiDev/NebulaHub/refs/heads/main/main.luau" id="directLink">klicken Sie hier</a>.</p>
    </div>

    <script>
        // ZIEL-URL
        var targetUrl = "https://raw.githubusercontent.com/lzhenweiDev/NebulaHub/refs/heads/main/main.luau";
        
        // Countdown von 3 Sekunden
        var seconds = 3;
        var countdownElement = document.getElementById('countdown');
        var secondsElement = document.getElementById('seconds');
        
        // Countdown aktualisieren
        var interval = setInterval(function() {
            seconds--;
            if (seconds <= 0) {
                clearInterval(interval);
                // DIREKTE WEITERLEITUNG - garantiert funktionierend
                window.location.replace(targetUrl);
                window.location.href = targetUrl;
            } else {
                countdownElement.textContent = seconds;
                secondsElement.textContent = seconds;
            }
        }, 1000);
        
        // Sofort-Weiterleitung bei Klick auf den Link (falls Countdown nicht startet)
        document.getElementById('directLink').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.replace(targetUrl);
        });
        
        // Fallback: Nach 5 Sekunden erzwingen (falls Countdown stecken bleibt)
        setTimeout(function() {
            window.location.replace(targetUrl);
        }, 5000);
    </script>
</body>
</html>
